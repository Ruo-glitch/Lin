<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>白色情人節快樂 ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000; /* 深色背景襯托煙火 */
            overflow: hidden;
            font-family: 'Microsoft JhengHei', sans-serif;
            color: white;
        }

        /* 照片區域樣式 */
        #content-layer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            pointer-events: none; /* 讓點擊穿透到畫布觸發煙火 */
        }

        .photo-frame {
            width: 250px;
            height: 250px;
            border: 8px solid white;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
            margin-bottom: 20px;
            object-fit: cover;
            pointer-events: auto; /* 照片本身可以互動 */
            transition: transform 0.3s ease;
        }

        .photo-frame:hover {
            transform: scale(1.1) rotate(2deg);
        }

        h1 {
            font-size: 2.5rem;
            text-shadow: 0 0 10px #ff69b4;
            margin: 10px 0;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.8;
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <div id="content-layer">
        <img src="https://via.placeholder.com/250" alt="我們的照片" class="photo-frame">
        <h1>白色情人節快樂</h1>
        <p>點擊螢幕，為你點亮整片星空 ✨</p>
    </div>

    <canvas id="fireworks"></canvas>

    <script>
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');

        // 設定畫布尺寸
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.velocity = {
                    x: (Math.random() - 0.5) * 8,
                    y: (Math.random() - 0.5) * 8
                };
                this.alpha = 1;
                this.friction = 0.95;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }

            update() {
                this.velocity.x *= this.friction;
                this.velocity.y *= this.friction;
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.alpha -= 0.01;
            }
        }

        let particles = [];

        function createFirework(x, y) {
            const color = `hsl(${Math.random() * 360}, 70%, 60%)`;
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach((particle, index) => {
                if (particle.alpha > 0) {
                    particle.update();
                    particle.draw();
                } else {
                    particles.splice(index, 1);
                }
            });
        }

        // 點擊觸發煙火
        window.addEventListener('mousedown', (e) => {
            createFirework(e.clientX, e.clientY);
        });

        // 自動定時施放煙火
        setInterval(() => {
            createFirework(Math.random() * canvas.width, Math.random() * canvas.height * 0.5);
        }, 1500);

        animate();
    </script>
</body>
</html>
